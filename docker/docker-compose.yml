version: "3.9"

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: sentiment-api:latest
    ports:
      - "8000:8000"
    environment:
      SENTIMENT_MODEL_PATH:      /artifacts/models/best_model
      SENTIMENT_TOKENIZER_PATH:  /artifacts/models/tokenizer.pkl
      SENTIMENT_WORKERS:         "2"
      SENTIMENT_LOG_LEVEL:       "info"
    volumes:
      - ../artifacts:/artifacts:ro
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout:  5s
      retries:  3
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    image: sentiment-app:latest
    ports:
      - "8501:8501"
    environment:
      SENTIMENT_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlruns.db
        --default-artifact-root /mlartifacts
    volumes:
      - mlflow_data:/mlartifacts
      - mlflow_db:/mlruns.db
    restart: unless-stopped

volumes:
  mlflow_data:
  mlflow_db:
